services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - MONGO_URL=mongodb://mongodb:27017/checkers
      - AI_URL=http://ai-service:3001
    depends_on:
      - mongodb

  ai-service:
    build: ./ai-service
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY:-}
    depends_on:
      - backend

volumes:
  mongodb_data:
