services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build: ./app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongodb
    profiles:
      - production

  app-dev:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - ./app:/app
      - /app/node_modules
    ports:
      - "3000:3000"
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - mongodb
    command: sh -c "bun install && bun run dev"
    profiles:
      - dev

volumes:
  mongodb_data:
