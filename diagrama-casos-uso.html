<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagrama de Casos de Uso — Debida Diligencia Anticorrupción</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:            #0a0d14;
    --surface:       #111520;
    --surface-2:     #161c2e;
    --border:        #1e2a42;
    --text:          #dde4f0;
    --text-muted:    #8896b0;
    --text-faint:    #3d4f6e;

    --teal:          #0e8a96;
    --teal-dark:     #072f35;
    --teal-glow:     rgba(14,138,150,0.4);
    --teal-label:    #72f0fd;

    --green:         #0e9a55;
    --green-dark:    #062819;
    --green-glow:    rgba(14,154,85,0.4);
    --green-label:   #5ef0a0;

    --purple:        #6040c8;
    --purple-dark:   #130d38;
    --purple-glow:   rgba(96,64,200,0.4);
    --purple-label:  #c4b5fd;

    --gold:          #b86a0a;
    --gold-dark:     #2a1600;
    --gold-glow:     rgba(184,106,10,0.45);
    --gold-label:    #fcd5a0;

    --actor-stroke:  #4a7fa8;
    --actor-fill:    #0a1828;
    --actor-glow:    rgba(74,127,168,0.3);

    --conn:          rgba(74,127,168,0.55);
    --conn-dashed:   rgba(148,163,184,0.4);
  }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .header h1 {
    font-size: clamp(1rem, 2.2vw, 1.45rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header p {
    margin-top: 0.35rem;
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── DIAGRAM ── */
  .diagram-wrap {
    width: 100%;
    max-width: 1120px;
  }

  svg.ucd {
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }

  /* ── LEGEND ── */
  .legend {
    margin-top: 1.75rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem 2rem;
    justify-content: center;
    padding: 0.9rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-muted);
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-line {
    width: 28px; height: 2px;
    background: repeating-linear-gradient(90deg, var(--text-muted) 0 5px, transparent 5px 9px);
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Sistema de Debida Diligencia Anticorrupción para Terceros</h1>
  <p>Diagrama de Casos de Uso</p>
</div>

<div class="diagram-wrap">
<!--
  ViewBox: 0 0 1060 820
  Layout:
    Actors left:  Proveedor(x=72), DataEntry(x=72), Cumplimiento(x=72)

    System box:   x=155 y=50 w=750 h=720

    <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>

    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="f-green" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>

    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="f-purple" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>
    <feFlood flood-color="#6040c8" flood-opacity="0.55" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="f-gold" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>
    <feFlood flood-color="#c07820" flood-opacity="0.6" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="f-actor" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="b"/>
    <feFlood flood-color="#4a7fa8" flood-opacity="0.25" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="f-system" x="-5%" y="-5%" width="110%" height="110%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="b"/>
    <feFlood flood-color="#1a4a7a" flood-opacity="0.2" result="c"/>
    <feComposite in="c" in2="b" operator="in" result="s"/>
    <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <!-- Arrow markers -->
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
    <path d="M0,0 L0,7 L9,3.5 z" fill="rgba(74,127,168,0.7)"/>
  </marker>
  <marker id="arr-d" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
    <path d="M0,0 L0,7 L9,3.5 z" fill="rgba(148,163,184,0.5)"/>
  </marker>

</defs>

<rect width="1060" height="820" fill="#0a0d14"/>
<rect width="1060" height="820" fill="url(#dots)"/>
